<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saloon Gold | Berber Giriş & Kayıt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: var(--bg-main);
        }
        .auth-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            animation: fadeIn 0.5s ease-out;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo {
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }
        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }
        .auth-tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-align: center;
            position: relative;
            font-family: inherit;
        }
        .auth-tab-btn.active {
            color: var(--accent-gold);
        }
        .auth-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--accent-gold);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-input);
            color: var(--text-primary);
            border-radius: var(--border-radius);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background-color: var(--bg-card);
            box-shadow: 0 0 0 3px var(--accent-gold-glow);
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>
    <div class="toast-container" id="toast-container"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo"><i class="fa-solid fa-scissors"></i></div>
                <h1 class="auth-title">Saloon Gold</h1>
                <p class="auth-subtitle">Berber Platformuna Hoş Geldiniz</p>
            </div>

            <div class="auth-tabs">
                <button type="button" class="auth-tab-btn active" id="tab-login">Giriş Yap</button>
                <button type="button" class="auth-tab-btn" id="tab-register">Kayıt Ol</button>
            </div>

            <!-- Giriş Formu -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">E-posta Adresi</label>
                    <input type="email" id="login-email" placeholder="ornek@berber.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Şifre</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 1.5rem;">
                    <i class="fa-solid fa-right-to-bracket"></i> Giriş Yap
                </button>
            </form>

            <!-- Kayıt Formu -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-email">E-posta Adresi</label>
                    <input type="email" id="register-email" placeholder="ornek@berber.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="register-password">Şifre (En az 6 Karakter)</label>
                    <input type="password" id="register-password" placeholder="••••••••" minlength="6" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="register-salon">Salon Adı</label>
                    <input type="text" id="register-salon" placeholder="Gold Barber Club" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 1.5rem;">
                    <i class="fa-solid fa-user-plus"></i> Kayıt Ol & Kurulum Yap
                </button>
            </form>

            <div class="auth-footer">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Randevu Sayfasına Dön</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase, showLoader, hideLoader, showToast } from './js/supabase-core.js';

        // DOM elements
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        const loginEmail = document.getElementById('login-email');
        const loginPassword = document.getElementById('login-password');

        const registerEmail = document.getElementById('register-email');
        const registerPassword = document.getElementById('register-password');
        const registerSalon = document.getElementById('register-salon');

        // Tab switches
        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
        });

        // Check active session
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'admin.html';
            }
        }
        checkSession();

        // Handle Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();

            showLoader();
            try {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showToast("Giriş başarılı, yönlendiriliyorsunuz...", "success");
                setTimeout(() => window.location.href = 'admin.html', 1000);
            } catch (error) {
                console.error("Giriş hatası:", error);
                showToast(error.message || "Giriş yapılamadı.", "error");
            } finally {
                hideLoader();
            }
        });

        // Handle Register
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = registerEmail.value.trim();
            const password = registerPassword.value.trim();
            const salonName = registerSalon.value.trim();

            showLoader();
            try {
                // 1. Sign up user
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) throw error;

                if (!data.user) {
                    throw new Error("Kullanıcı oluşturulamadı. Lütfen e-postayı kontrol edin.");
                }

                // Wait a split second to let the SQL trigger finish creating the barber record
                await new Promise(resolve => setTimeout(resolve, 800));

                // 2. Update the default salon name created by trigger
                const { error: profileError } = await supabase
                    .from('barbers')
                    .update({ salon_name: salonName })
                    .eq('id', data.user.id);

                if (profileError) throw profileError;

                showToast("Kayıt başarılı! Giriş yapılıyor...", "success");
                setTimeout(() => window.location.href = 'admin.html', 1200);
            } catch (error) {
                console.error("Kayıt hatası:", error);
                showToast(error.message || "Kayıt işlemi başarısız.", "error");
            } finally {
                hideLoader();
            }
        });
    </script>
</body>
</html>
